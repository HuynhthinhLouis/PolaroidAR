<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polaroid AR Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #111; --bg: #f4f4f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: var(--bg); color: #333; }
        
        #app-create { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; min-height: 100vh; }
        .form-container { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .form-container h2 { text-align: center; margin-top: 0; margin-bottom: 20px; color: var(--primary); font-weight: 600; }
        .input-group { margin-bottom: 12px; }
        input[type="file"], input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; background: #fafafa; }
        .btn-submit, .btn-secondary { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-secondary { background: #fff; border: 2px solid var(--primary); color: var(--primary); }
        
        .crop-container { display: none; width: 100%; height: 350px; margin-bottom: 15px; background: #222; border-radius: 8px; overflow: hidden; }
        .crop-container img { max-width: 100%; display: block; }
        
        /* GIAO DIỆN PREVIEW MỚI */
        #preview-section { display: none; width: 100%; max-width: 360px; animation: fadeIn 0.4s; }
        .instax-preview { width: 100%; background: #fcfcfc; padding: 15px 15px 15px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; margin: 0 auto 20px auto; border-radius: 4px;}
        
        .photo-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #222; }
        .photo-wrapper img.photo { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* CHỮ LỒNG TRONG ẢNH GÓC NHỎ */
        .text-overlay {
            position: absolute;
            bottom: 12px;
            left: 12px;
            color: #ffffff;
            font-family: 'Consolas', 'Courier New', Courier, monospace; /* Font Consolas */
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000, 0px 5px 15px rgba(0,0,0,0.9); /* Bóng đổ dày, viền đen */
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .text-overlay .sender { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .text-overlay .digital-font { font-size: 12px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.9;}
        
        /* MÃ VẠCH CHIẾM TRỌN ĐÁY */
        .bottom-barcode-container { width: 100%; padding-top: 12px; display: flex; justify-content: center;}
        #prev-barcode { width: 100% !important; height: 50px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* KHUNG EXPORT ẨN (DÀNH ĐỂ TẢI VỀ NÉT CĂNG) */
        #polaroid-wrapper { position: absolute; top: -9999px; left: -9999px; }
        #polaroid-frame { width: 450px; background: #fcfcfc; padding: 20px 20px 20px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; border-radius: 6px;}
        
        .export-photo-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #222; }
        #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .export-text-overlay {
            position: absolute;
            bottom: 18px;
            left: 18px;
            color: #ffffff;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            text-shadow: 3px 3px 0px #000, -1.5px -1.5px 0px #000, 1.5px -1.5px 0px #000, -1.5px 1.5px 0px #000, 1.5px 1.5px 0px #000, 0px 8px 20px rgba(0,0,0,0.9);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .export-text-overlay .sender { font-size: 26px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px;}
        .export-text-overlay .digital-font { font-size: 16px; font-weight: bold; letter-spacing: 1px;}
        
        .export-bottom-container { width: 100%; padding-top: 15px;}
        #export-barcode { width: 100% !important; height: 75px; }
    </style>
</head>
<body>

    <div id="app-create">
        <div class="form-container" id="input-section">
            <h2>Thiết Kế ID Card</h2>
            <input type="file" id="imageInput" accept="image/*">
            <div class="crop-container" id="cropContainer"><img id="imageToCrop" src="" alt=""></div>
            
            <div class="input-group"><input type="text" id="sender" placeholder="Tên / Bí danh (Góc ảnh)"></div>
            <div class="input-group"><textarea id="message" rows="3" placeholder="Viết tâm thư ẩn vào đây..."></textarea></div>
            
            <button class="btn-submit" id="btn-preview" onclick="createAndPreviewPolaroid()">Mã hóa & Tạo thẻ</button>
        </div>

        <div id="preview-section">
            <div class="instax-preview">
                <div class="photo-wrapper">
                    <img class="photo" id="preview-img" src="" alt="Preview">
                    <div class="text-overlay">
                        <div class="sender" id="prev-sender"></div>
                        <div class="digital-font" id="prev-digital"></div>
                    </div>
                </div>
                <div class="bottom-barcode-container">
                    <svg id="prev-barcode"></svg>
                </div>
            </div>
            <button class="btn-submit" id="btn-download" onclick="downloadPolaroid()">Tải thẻ về máy</button>
            <button class="btn-secondary" onclick="backToEdit()">Tạo thẻ khác</button>
        </div>

        <div id="polaroid-wrapper">
            <div id="polaroid-frame">
                <div class="export-photo-wrapper">
                    <img id="uploaded-img" src="" alt="">
                    <div class="export-text-overlay">
                        <div class="sender" id="export-sender"></div>
                        <div class="digital-font" id="export-digital"></div>
                    </div>
                </div>
                <div class="export-bottom-container">
                    <svg id="export-barcode"></svg>
                </div>
            </div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let cropper, currentSender = "";

    window.onload = () => { initCreateMode(); };

    function getDigitalDate() {
        const d = new Date(); return `REC: ${d.getFullYear()}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getDate().toString().padStart(2,'0')}`;
    }

    function initCreateMode() {
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('imageToCrop').src = URL.createObjectURL(file);
                document.getElementById('cropContainer').style.display = 'block';
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToCrop'), {
                    aspectRatio: 3 / 4, viewMode: 1, dragMode: 'move', zoomable: true, scalable: true, cropBoxMovable: false, cropBoxResizable: false, toggleDragModeOnDblclick: false,
                });
            }
        });
    }

    async function createAndPreviewPolaroid() {
        const sender = document.getElementById('sender').value, message = document.getElementById('message').value;
        if(!cropper || !sender || !message) return alert("Vui lòng điền đủ thông tin!"); 

        const btn = document.getElementById('btn-preview'); btn.innerText = "Đang mã hóa dữ liệu..."; btn.disabled = true;

        try {
            const canvas = cropper.getCroppedCanvas({ width: 600, height: 800 });
            const croppedFile = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            
            // ID siêu ngắn (6 ký tự) quét chớp nhoáng
            const shortId = Math.random().toString(36).substring(2, 8).toUpperCase();

            const fileName = `instax_${Date.now()}_${shortId}.jpg`;
            await mySupabase.storage.from('polaroid_images').upload(fileName, croppedFile);
            const { data: pUrl } = mySupabase.storage.from('polaroid_images').getPublicUrl(fileName);

            // Lưu DB (Bỏ biến recipient)
            await mySupabase.from('polaroids').insert([{ 
                sender, recipient: "HIDDEN", message, image_url: pUrl.publicUrl, short_id: shortId
            }]);
            
            currentSender = sender;

            // Render Preview
            document.getElementById('preview-img').src = canvas.toDataURL("image/jpeg", 0.8);
            document.getElementById('prev-sender').innerText = sender;
            document.getElementById('prev-digital').innerText = `${getDigitalDate()} // ID:${shortId}`;
            JsBarcode("#prev-barcode", shortId, { height: 40, width: 2, displayValue: false, margin: 0, lineColor: "#111", background: "transparent" });

            // Render Export
            document.getElementById('uploaded-img').src = canvas.toDataURL("image/jpeg", 1.0);
            document.getElementById('export-sender').innerText = sender;
            document.getElementById('export-digital').innerText = `${getDigitalDate()} // ID:${shortId}`;
            JsBarcode("#export-barcode", shortId, { height: 80, width: 4, displayValue: false, margin: 0, lineColor: "#111", background: "transparent" });

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('preview-section').style.display = 'block';
            window.scrollTo(0, 0);

        } catch (error) { alert("Lỗi: " + error.message); } 
        finally { btn.innerText = "Mã hóa & Tạo thẻ"; btn.disabled = false; }
    }

    function downloadPolaroid() {
        const btn = document.getElementById('btn-download'); btn.innerText = "Đang tải..."; btn.disabled = true;
        html2canvas(document.getElementById('polaroid-frame'), { scale: 3, useCORS: true, backgroundColor: "#fcfcfc" }).then(canvas => {
            let link = document.createElement('a'); link.download = `IDCard_${currentSender}.png`; link.href = canvas.toDataURL("image/png"); link.click();
            btn.innerText = "Hoàn tất!"; setTimeout(() => { btn.innerText = "Tải thẻ về máy"; btn.disabled = false; }, 2000);
        });
    }

    function backToEdit() { document.getElementById('input-section').style.display = 'block'; document.getElementById('preview-section').style.display = 'none'; }
</script>
</body>
</html>
