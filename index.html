<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vintage Gift Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* TONE MÀU KRAFT PAPER / VINTAGE */
        :root { 
            --text-dark: #3e2f25; 
            --paper-bg: #e6d5b8; 
            --card-bg: #fbf7f0; 
            --accent: #8c6a50; 
            --border: #c8b495;
        }
        body { font-family: 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; background: var(--paper-bg); color: var(--text-dark); }
        
        #app-create { display: flex; flex-direction: column; align-items: center; padding: 30px 15px; min-height: 100vh; }
        
        /* Form Tạo Quà */
        .form-container { background: var(--card-bg); padding: 35px 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(62, 47, 37, 0.15); margin-bottom: 20px; width: 100%; max-width: 420px; box-sizing: border-box; border: 1px solid var(--border); }
        .form-container h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: var(--text-dark); font-weight: 800; font-size: 22px; letter-spacing: -0.5px;}
        .input-group { margin-bottom: 15px; }
        input[type="file"], input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Be Vietnam Pro', sans-serif; font-size: 15px; background: #fff; transition: 0.3s; color: var(--text-dark);}
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .btn-submit, .btn-secondary { width: 100%; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.2s; margin-top: 10px; font-family: 'Be Vietnam Pro', sans-serif; }
        .btn-submit { background: var(--text-dark); color: #fff; box-shadow: 0 6px 15px rgba(62, 47, 37, 0.3);}
        .btn-submit:hover { background: #2a1f18; transform: translateY(-2px); }
        .btn-submit:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none;}
        .btn-secondary { background: transparent; border: 2px solid var(--text-dark); color: var(--text-dark); }
        .btn-secondary:hover { background: rgba(62, 47, 37, 0.05); }
        
        .crop-container { display: none; width: 100%; height: 350px; margin-bottom: 15px; background: #222; border-radius: 8px; overflow: hidden; }
        .crop-container img { max-width: 100%; display: block; }

        /* Khung Preview (Giống Polaroid Giấy) */
        #preview-section { display: none; width: 100%; max-width: 380px; animation: fadeIn 0.4s ease-out; }
        .polaroid-card { background: var(--card-bg); padding: 16px 16px 20px 16px; box-shadow: 2px 5px 15px rgba(0,0,0,0.15); border-radius: 4px; margin: 0 auto 25px auto; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.05);}
        
        .photo-wrapper { width: 100%; aspect-ratio: 3/4; overflow: hidden; border-radius: 2px; background: #222;}
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .polaroid-text { margin-top: 18px; text-align: center; display: flex; flex-direction: column; align-items: center;}
        .handwriting { font-family: 'Caveat', cursive; font-size: 28px; color: var(--text-dark); font-weight: 700; line-height: 1.2; letter-spacing: 0.5px;}
        .hint-text { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; margin-bottom: 5px; font-weight: 700;}
        
        .barcode-container { width: 100%; display: flex; justify-content: center; mix-blend-mode: multiply;}
        #prev-barcode { width: 100% !important; height: 45px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* KHUNG EXPORT ẨN (MÃ VẠCH SIÊU ĐẬM) */
        #polaroid-wrapper { position: absolute; top: -9999px; left: -9999px; }
        #export-frame { width: 450px; background: var(--card-bg); padding: 22px 22px 30px 22px; display: flex; flex-direction: column;}
        .export-photo { width: 100%; aspect-ratio: 3/4; border-radius: 2px; object-fit: cover; background: #222;}
        
        .export-text { margin-top: 25px; text-align: center; }
        .export-handwriting { font-family: 'Caveat', cursive; font-size: 36px; color: var(--text-dark); font-weight: 700;}
        .export-hint { font-size: 13px; color: var(--accent); font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 15px; margin-bottom: 8px; font-weight: 800;}
        
        .export-barcode-wrapper { width: 100%; display: flex; justify-content: center; mix-blend-mode: multiply;}
        #export-barcode { width: 100% !important; height: 100px; } /* Cao và bự để quét xa */
    </style>
</head>
<body>

    <div id="app-create">
        <div class="form-container" id="input-section">
            <h2>Đóng Gói Kỷ Niệm 📦</h2>
            <input type="file" id="imageInput" accept="image/*">
            <div class="crop-container" id="cropContainer"><img id="imageToCrop" src="" alt=""></div>
            
            <div class="input-group"><input type="text" id="recipient" placeholder="Gửi đến: (VD: Bạn thân mến)"></div>
            <div class="input-group"><input type="text" id="sender" placeholder="Ký tên: (VD: Người giấu mặt)"></div>
            <div class="input-group"><textarea id="message" rows="4" placeholder="Viết tâm thư vào đây nhé..."></textarea></div>
            
            <button class="btn-submit" id="btn-preview" onclick="createAndPreview()">Tạo Thẻ Polaroid</button>
        </div>

        <div id="preview-section">
            <div class="polaroid-card">
                <div class="photo-wrapper"><img id="preview-img" src="" alt="Preview"></div>
                <div class="polaroid-text">
                    <div class="handwriting" id="prev-names"></div>
                    <div class="hint-text">QUÉT MÃ ĐỂ MỞ THƯ</div>
                    <div class="barcode-container"><svg id="prev-barcode"></svg></div>
                </div>
            </div>
            <button class="btn-submit" id="btn-download" onclick="downloadPolaroid()">Tải ảnh in nét cao</button>
            <button class="btn-secondary" onclick="backToEdit()">Tạo tấm khác</button>
        </div>

        <div id="polaroid-wrapper">
            <div id="export-frame">
                <img class="export-photo" id="uploaded-img" src="" alt="">
                <div class="export-text">
                    <div class="export-handwriting" id="export-names"></div>
                    <div class="export-hint">SỬ DỤNG MÁY QUÉT ĐỂ MỞ THƯ</div>
                    <div class="export-barcode-wrapper"><svg id="export-barcode"></svg></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let cropper, currentFilename = "";

    window.onload = () => { initCreateMode(); };

    function initCreateMode() {
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('imageToCrop').src = URL.createObjectURL(file);
                document.getElementById('cropContainer').style.display = 'block';
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToCrop'), {
                    aspectRatio: 3 / 4, viewMode: 1, dragMode: 'move', zoomable: true, scalable: true, cropBoxMovable: false, cropBoxResizable: false, toggleDragModeOnDblclick: false,
                });
            }
        });
    }

    async function createAndPreview() {
        const sender = document.getElementById('sender').value;
        const recipient = document.getElementById('recipient').value;
        const message = document.getElementById('message').value;
        if(!cropper || !sender || !recipient || !message) return alert("Vui lòng điền đủ thông tin nha!"); 

        const btn = document.getElementById('btn-preview'); btn.innerText = "Đang xử lý..."; btn.disabled = true;

        try {
            const canvas = cropper.getCroppedCanvas({ width: 900, height: 1200 });
            const croppedFile = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            
            const shortId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const fileName = `vintage_${Date.now()}_${shortId}.jpg`;
            
            await mySupabase.storage.from('polaroid_images').upload(fileName, croppedFile);
            const { data: pUrl } = mySupabase.storage.from('polaroid_images').getPublicUrl(fileName);

            await mySupabase.from('polaroids').insert([{ 
                sender, recipient, message, image_url: pUrl.publicUrl, short_id: shortId
            }]);
            
            currentFilename = recipient.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const displayNames = `${recipient} & ${sender}`;

            document.getElementById('preview-img').src = canvas.toDataURL("image/jpeg", 0.5);
            document.getElementById('prev-names').innerText = displayNames;
            // Preview Barcode
            JsBarcode("#prev-barcode", shortId, { height: 45, width: 2.2, displayValue: false, margin: 0, lineColor: "#3e2f25", background: "transparent" });

            document.getElementById('uploaded-img').src = canvas.toDataURL("image/jpeg", 1.0);
            document.getElementById('export-names').innerText = displayNames;
            // EXPORT BARCODE: Vạch Cực Đậm (width: 5.5) để in ra dễ quét
            JsBarcode("#export-barcode", shortId, { height: 100, width: 5.5, displayValue: false, margin: 0, lineColor: "#3e2f25", background: "transparent" });

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('preview-section').style.display = 'block';
            window.scrollTo(0, 0);

        } catch (error) { alert("Lỗi: " + error.message); } 
        finally { btn.innerText = "Tạo Thẻ Polaroid"; btn.disabled = false; }
    }

    function downloadPolaroid() {
        const btn = document.getElementById('btn-download'); btn.innerText = "Đang lưu..."; btn.disabled = true;
        html2canvas(document.getElementById('export-frame'), { scale: 3, useCORS: true, backgroundColor: "#fbf7f0" }).then(canvas => {
            let link = document.createElement('a'); link.download = `Polaroid_${currentFilename}.png`; link.href = canvas.toDataURL("image/png"); link.click();
            btn.innerText = "Đã tải xong!"; setTimeout(() => { btn.innerText = "Tải ảnh in nét cao"; btn.disabled = false; }, 2000);
        });
    }

    function backToEdit() { document.getElementById('input-section').style.display = 'block'; document.getElementById('preview-section').style.display = 'none'; }
</script>
</body>
</html>
