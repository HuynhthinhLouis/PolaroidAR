<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polaroid Gift Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #ff6b81; --bg: #fff5f6; --text: #2f3542; }
        body { font-family: 'Nunito', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        
        #app-create { display: flex; flex-direction: column; align-items: center; padding: 30px 15px; min-height: 100vh; }
        
        /* Form Tạo Quà */
        .form-container { background: #ffffff; padding: 30px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(255, 107, 129, 0.1); margin-bottom: 20px; width: 100%; max-width: 420px; box-sizing: border-box; }
        .form-container h2 { text-align: center; margin-top: 0; margin-bottom: 25px; color: var(--primary); font-weight: 800; font-size: 24px;}
        .input-group { margin-bottom: 15px; }
        input[type="file"], input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 14px; border: 2px solid #f1f2f6; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; background: #fafbfc; transition: 0.3s; color: #57606f;}
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff;}
        
        .btn-submit, .btn-secondary { width: 100%; padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(255, 107, 129, 0.3);}
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 107, 129, 0.4); }
        .btn-secondary { background: #fff; border: 2px solid #f1f2f6; color: #747d8c; }
        .btn-secondary:hover { background: #f1f2f6; }
        
        .crop-container { display: none; width: 100%; height: 350px; margin-bottom: 15px; background: #f1f2f6; border-radius: 12px; overflow: hidden; }
        .crop-container img { max-width: 100%; display: block; }

        /* Khung Preview (Giống Polaroid) */
        #preview-section { display: none; width: 100%; max-width: 380px; animation: fadeIn 0.5s cubic-bezier(0.1, 0.8, 0.2, 1); }
        .polaroid-card { background: #fff; padding: 16px 16px 20px 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border-radius: 10px; margin: 0 auto 25px auto; display: flex; flex-direction: column;}
        
        .photo-wrapper { width: 100%; aspect-ratio: 3/4; overflow: hidden; border-radius: 6px; background: #eee;}
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .polaroid-text { margin-top: 15px; text-align: center; display: flex; flex-direction: column; align-items: center;}
        .handwriting { font-family: 'Caveat', cursive; font-size: 26px; color: #2f3542; font-weight: 700; line-height: 1.2; letter-spacing: 1px;}
        .hint-text { font-size: 10px; color: #a4b0be; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; margin-bottom: 4px; font-weight: 800;}
        
        .barcode-container { width: 100%; opacity: 0.85; display: flex; justify-content: center;}
        #prev-barcode { width: 100% !important; height: 40px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* KHUNG EXPORT ẨN (NÉT CAO) */
        #polaroid-wrapper { position: absolute; top: -9999px; left: -9999px; }
        #export-frame { width: 500px; background: #ffffff; padding: 25px 25px 35px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; display: flex; flex-direction: column;}
        .export-photo { width: 100%; aspect-ratio: 3/4; border-radius: 8px; object-fit: cover; background: #eee;}
        
        .export-text { margin-top: 25px; text-align: center; }
        .export-handwriting { font-family: 'Caveat', cursive; font-size: 38px; color: #2f3542; font-weight: 700; line-height: 1.2; letter-spacing: 1px;}
        .export-hint { font-size: 14px; color: #a4b0be; font-family: 'Nunito', sans-serif; letter-spacing: 2px; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px; font-weight: 800;}
        
        .export-barcode-wrapper { width: 100%; display: flex; justify-content: center; }
        #export-barcode { width: 100% !important; height: 85px; } /* Vạch bự để quét từ xa */
    </style>
</head>
<body>

    <div id="app-create">
        <div class="form-container" id="input-section">
            <h2>Gói Gém Kỷ Niệm 🎁</h2>
            <input type="file" id="imageInput" accept="image/*">
            <div class="crop-container" id="cropContainer"><img id="imageToCrop" src="" alt=""></div>
            
            <div class="input-group"><input type="text" id="recipient" placeholder="Gửi tới ai đó... (VD: Gửi Bé Mèo)"></div>
            <div class="input-group"><input type="text" id="sender" placeholder="Từ ai đó... (VD: Ký tên: Cún)"></div>
            <div class="input-group"><textarea id="message" rows="4" placeholder="Viết những lời muốn giấu kín vào đây nhé..."></textarea></div>
            
            <button class="btn-submit" id="btn-preview" onclick="createAndPreview()">Gói quà & Xem trước</button>
        </div>

        <div id="preview-section">
            <div class="polaroid-card">
                <div class="photo-wrapper"><img id="preview-img" src="" alt="Preview"></div>
                <div class="polaroid-text">
                    <div class="handwriting" id="prev-names"></div>
                    <div class="hint-text">Quét mã để mở thư</div>
                    <div class="barcode-container"><svg id="prev-barcode"></svg></div>
                </div>
            </div>
            <button class="btn-submit" id="btn-download" onclick="downloadPolaroid()">Tải ảnh nét về máy</button>
            <button class="btn-secondary" onclick="backToEdit()">Tạo món quà khác</button>
        </div>

        <div id="polaroid-wrapper">
            <div id="export-frame">
                <img class="export-photo" id="uploaded-img" src="" alt="">
                <div class="export-text">
                    <div class="export-handwriting" id="export-names"></div>
                    <div class="export-hint">SỬ DỤNG MÁY QUÉT ĐỂ MỞ THƯ BÍ MẬT</div>
                    <div class="export-barcode-wrapper"><svg id="export-barcode"></svg></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let cropper, currentFilename = "";

    window.onload = () => { initCreateMode(); };

    function initCreateMode() {
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('imageToCrop').src = URL.createObjectURL(file);
                document.getElementById('cropContainer').style.display = 'block';
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToCrop'), {
                    aspectRatio: 3 / 4, viewMode: 1, dragMode: 'move', zoomable: true, scalable: true, cropBoxMovable: false, cropBoxResizable: false, toggleDragModeOnDblclick: false,
                });
            }
        });
    }

    async function createAndPreview() {
        const sender = document.getElementById('sender').value;
        const recipient = document.getElementById('recipient').value;
        const message = document.getElementById('message').value;
        if(!cropper || !sender || !recipient || !message) return alert("Bạn điền thiếu thông tin kìa!"); 

        const btn = document.getElementById('btn-preview'); btn.innerText = "Đang phù phép..."; btn.disabled = true;

        try {
            const canvas = cropper.getCroppedCanvas({ width: 900, height: 1200 }); // Ảnh nét căng
            const croppedFile = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            
            const shortId = Math.random().toString(36).substring(2, 8).toUpperCase();

            const fileName = `gift_${Date.now()}_${shortId}.jpg`;
            await mySupabase.storage.from('polaroid_images').upload(fileName, croppedFile);
            const { data: pUrl } = mySupabase.storage.from('polaroid_images').getPublicUrl(fileName);

            await mySupabase.from('polaroids').insert([{ 
                sender, recipient, message, image_url: pUrl.publicUrl, short_id: shortId
            }]);
            
            currentFilename = recipient.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const displayNames = `${recipient} & ${sender}`;

            // Preview
            document.getElementById('preview-img').src = canvas.toDataURL("image/jpeg", 0.5);
            document.getElementById('prev-names').innerText = displayNames;
            JsBarcode("#prev-barcode", shortId, { height: 40, width: 2, displayValue: false, margin: 0, lineColor: "#2f3542", background: "transparent" });

            // Export (Barcode đậm nét để dễ quét)
            document.getElementById('uploaded-img').src = canvas.toDataURL("image/jpeg", 1.0);
            document.getElementById('export-names').innerText = displayNames;
            JsBarcode("#export-barcode", shortId, { height: 85, width: 4.5, displayValue: false, margin: 0, lineColor: "#2f3542", background: "transparent" });

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('preview-section').style.display = 'block';
            window.scrollTo(0, 0);

        } catch (error) { alert("Có lỗi xảy ra: " + error.message); } 
        finally { btn.innerText = "Gói quà & Xem trước"; btn.disabled = false; }
    }

    function downloadPolaroid() {
        const btn = document.getElementById('btn-download'); btn.innerText = "Đang lưu..."; btn.disabled = true;
        html2canvas(document.getElementById('export-frame'), { scale: 3, useCORS: true, backgroundColor: "transparent" }).then(canvas => {
            let link = document.createElement('a'); link.download = `Polaroid_${currentFilename}.png`; link.href = canvas.toDataURL("image/png"); link.click();
            btn.innerText = "Hoàn tất!"; setTimeout(() => { btn.innerText = "Tải ảnh nét về máy"; btn.disabled = false; }, 2000);
        });
    }

    function backToEdit() { document.getElementById('input-section').style.display = 'block'; document.getElementById('preview-section').style.display = 'none'; }
</script>
</body>
</html>
