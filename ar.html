<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PolaroidAR | Máy Quét Tâm Thư</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Dancing+Script:wght@600;700&family=Caveat:wght@600;700&display=swap&subset=vietnamese" rel="stylesheet">

    <style>
        :root { --text-dark: #3e2f25; --accent: #d4a373; --bg-overlay: rgba(62, 47, 37, 0.75); --card-bg: #fbf7f0;}
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Be Vietnam Pro', sans-serif; }
        
        #interactive.viewport { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #interactive.viewport video, #interactive.viewport canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #interactive.viewport canvas { z-index: 2; pointer-events: none; }
        
        /* BRANDING TOP BAR & HỆ THỐNG NÚT */
        .ar-top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }
        .ar-logo {
            font-family: 'Be Vietnam Pro', sans-serif; font-size: 24px; font-weight: 800;
            color: #2a1f18;
            letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            margin: 0; background: rgba(255, 253, 248, 0.6); 
            backdrop-filter: blur(8px); padding: 8px 16px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ar-logo span { color: var(--accent); }

        .ar-actions { display: flex; gap: 10px; pointer-events: all; }
        .btn-action {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.4); color: #fff; 
            padding: 8px 14px; border-radius: 20px; font-size: 13px; 
            font-weight: 700; text-decoration: none; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }

        .flash-effect { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .flash-effect.trigger { animation: flashAnim 0.6s ease-out forwards; }
        @keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        .freeze-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(30, 20, 15, 0.6); 
            backdrop-filter: blur(12px) sepia(60%) contrast(120%); 
            z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; 
        }
        .freeze-overlay.active { opacity: 1; pointer-events: all; }

        .camera-mask { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; pointer-events: none; overflow: hidden; transition: opacity 0.4s; }
        
        .polaroid-guide { 
            width: 78vw; max-width: 320px; aspect-ratio: 3 / 4.2; 
            border: 2px solid rgba(212, 163, 115, 0.5); 
            border-radius: 12px; 
            box-shadow: 0 0 0 4000px rgba(20, 15, 10, 0.8), 0 0 20px rgba(212, 163, 115, 0.4) inset; 
            display: flex; flex-direction: column; overflow: hidden; 
            background: rgba(212, 163, 115, 0.05); 
            position: relative;
        }
        .photo-guide { flex: 1; position: relative; border-bottom: 2px dashed rgba(212, 163, 115, 0.4);}
        
        .barcode-guide { height: 25%; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .laser-line { 
            position: absolute; width: 200%; height: 50px; 
            background: linear-gradient(to bottom, rgba(212,163,115,0) 0%, rgba(212,163,115,0.4) 50%, rgba(212,163,115,0.8) 100%);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 5px 15px var(--accent);
            animation: magicScan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            left: -50%;
        }
        @keyframes magicScan { 
            0% { top: -60px; opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
        
        .scan-hint { color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 2; text-transform: uppercase;}

        .status-wrapper { position: absolute; top: 11vh; left: 50%; transform: translateX(-50%); z-index: 10; width: 90%; max-width: 350px; text-align: center; transition: opacity 0.3s;}
        #status-ui { background: var(--card-bg); color: var(--text-dark); padding: 12px 20px; border-radius: 25px; font-size: 14px; font-weight: 700; box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3); display: inline-block; border: 1px solid var(--accent); transition: all 0.3s;}
        
        #message-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; width: 85%; max-width: 360px;
            pointer-events: none; opacity: 0;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #message-wrapper.show { pointer-events: all; opacity: 1; }

        #message-card {
            background: var(--card-bg); border-radius: 12px; padding: 30px 20px 25px 20px;
            box-shadow: 0 0 40px rgba(212, 163, 115, 0.4), 0 20px 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid #c8b495;
            transform-style: preserve-3d;
        }

        .msg-header, .msg-scroll-area, .btn-rescan { transform: translateZ(30px); }
        .msg-header { width: 100%; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(62, 47, 37, 0.1); padding-bottom: 10px;}
        .msg-recipient, .msg-sender { font-family: 'Dancing Script', 'Caveat', cursive; color: var(--text-dark); }
        .msg-recipient { font-size: 28px; font-weight: 700; margin-bottom: 0;}
        .msg-sender { font-size: 22px; color: #7a614e; font-weight: 600;}
        
        .msg-scroll-area { width: 100%; max-height: 250px; overflow-y: auto; margin-bottom: 25px; padding: 0 5px; }
        .msg-scroll-area::-webkit-scrollbar { width: 5px; }
        .msg-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .msg-scroll-area::-webkit-scrollbar-thumb { background: #c8b495; border-radius: 10px; }

        .msg-text { 
            font-family: 'Dancing Script', 'Caveat', cursive; font-size: 28px; color: var(--text-dark); 
            line-height: 1.4; text-align: center; margin: 0; white-space: pre-wrap; word-break: break-word; 
        }

        .ink-reveal {
            opacity: 0; filter: blur(8px); transform: translateY(10px);
            animation: inkRevealAnim 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes inkRevealAnim {
            0% { opacity: 0; filter: blur(8px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        #card-recipient { animation-delay: 0.4s; }
        #card-sender { animation-delay: 0.8s; }
        #card-message { animation-delay: 1.2s; }
        
        .btn-rescan { background: transparent; color: var(--text-dark); border: 2px solid var(--text-dark); padding: 14px 30px; border-radius: 8px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-rescan:active { background: rgba(62, 47, 37, 0.05); transform: scale(0.96); }

        .credit-footer {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            font-size: 11px; color: rgba(255, 255, 255, 0.65); font-weight: 600;
            letter-spacing: 0.5px; z-index: 10; pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>

    <div class="ar-top-bar">
        <h1 class="ar-logo">Polaroid<span>AR</span></h1>
        
        <div class="ar-actions">
            <label for="file-scan-input" class="btn-action">
                🖼️ Tải ảnh
            </label>
            <input type="file" id="file-scan-input" accept="image/*" style="display: none;">
            
            <a href="https://huynhthinhlouis.github.io/polaroidar/" class="btn-action" title="Về trang tạo thẻ">🏠</a>
        </div>
    </div>

    <div class="flash-effect" id="flash"></div>
    <div id="interactive" class="viewport"></div>
    <div id="freeze-overlay" class="freeze-overlay"></div>

    <div class="camera-mask" id="scan-ui">
        <div class="polaroid-guide">
            <div class="photo-guide"></div>
            <div class="barcode-guide">
                <div class="scan-hint">MÁY QUÉT</div>
                <div class="laser-line"></div>
            </div>
        </div>
    </div>
    
    <div class="status-wrapper" id="status-wrapper">
        <div id="status-ui">Khớp mã vạch vào khung 📷</div>
    </div>
    
    <div id="message-wrapper">
        <div id="message-card" data-tilt data-tilt-glare data-tilt-max-glare="0.3" data-tilt-scale="1.05">
            <div class="msg-header">
                <div class="msg-recipient" id="card-recipient"></div>
                <div class="msg-sender" id="card-sender"></div>
            </div>
            <div class="msg-scroll-area" id="msg-scroll-area">
                <p class="msg-text" id="card-message"></p>
            </div>
            <button class="btn-rescan" onclick="resetScanner()">Đóng & Quét Thẻ Khác</button>
        </div>
    </div>

    <div class="credit-footer">Tạo thành và phát triển bởi Huỳnh Hưng Thịnh</div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function checkMaintenanceStatus() {
        try {
            const { data, error } = await mySupabase.from('app_settings').select('*').eq('id', 1).single();
            if (data && data.is_maintenance) {
                document.body.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#2a1f18; color:#fbf7f0; font-family:'Be Vietnam Pro', sans-serif; text-align:center; padding: 20px;">
                        <h1 style="color:#d4a373; font-size: 32px; margin-bottom: 10px;">⚙️ HỆ THỐNG ĐANG BẢO TRÌ</h1>
                        <p style="font-size: 18px; line-height: 1.6; max-width: 500px;">${data.maintenance_msg}</p>
                    </div>
                `;
                throw new Error("Maintenance mode active"); 
            }
        } catch (err) {
            if(err.message === "Maintenance mode active") throw err;
            console.error("Lỗi kiểm tra bảo trì:", err);
        }
    }
    checkMaintenanceStatus();

    const statusUI = document.getElementById('status-ui');
    const scanUI = document.getElementById('scan-ui');
    const freezeOverlay = document.getElementById('freeze-overlay');
    const messageWrapper = document.getElementById('message-wrapper');
    const statusWrapper = document.getElementById('status-wrapper');
    const flashEffect = document.getElementById('flash');
    const scrollArea = document.getElementById('msg-scroll-area');

    window.onload = () => { startScanner(); initFileScanner(); };

    // TÁCH LOGIC XỬ LÝ KHI QUÉT THÀNH CÔNG ĐỂ DÙNG CHUNG CHO CAMERA VÀ ẢNH UP LÊN
    function handleSuccessfulScan(code) {
        Quagga.stop(); 
        
        flashEffect.classList.remove('trigger');
        void flashEffect.offsetWidth; 
        flashEffect.classList.add('trigger');

        const videoEl = document.querySelector("#interactive video");
        if(videoEl) videoEl.pause(); 

        scanUI.style.opacity = '0';
        statusUI.innerText = "Đang mở thư...";
        freezeOverlay.classList.add('active');

        fetchMessageAndAnimate(code);
    }

    function startScanner() {
        statusUI.innerText = "Khớp mã vạch vào khung nhé 📷";
        
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 }, advanced: [{ focusMode: "continuous" }] },
                // VỚI LIVE CAM: Mình ép nó quét đúng khung giữa để tăng tốc độ và độ chuẩn xác
                area: { top: "65%", bottom: "5%", left: "10%", right: "10%" }
            },
            locator: { patchSize: "large", halfSample: true },
            numOfWorkers: navigator.hardwareConcurrency || 4,
            decoder: { readers: ["code_128_reader"], multiple: false },
            locate: true 
        }, (err) => {
            if (err) return statusUI.innerText = "Lỗi: Hãy cho phép dùng Camera.";
            Quagga.start();
        });

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (code && code.length === 6) { 
                handleSuccessfulScan(code);
            }
        });
    }

    // TÍNH NĂNG QUÉT TỪ ẢNH LƯU TRONG MÁY
    function initFileScanner() {
        document.getElementById('file-scan-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Tạm dừng camera live để dành toàn bộ sức mạnh phần cứng quét ảnh tĩnh
            Quagga.stop();
            const videoEl = document.querySelector("#interactive video");
            if(videoEl) videoEl.pause();

            statusUI.innerText = "🔍 Đang rà quét toàn bộ bức ảnh...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                Quagga.decodeSingle({
                    src: event.target.result,
                    numOfWorkers: navigator.hardwareConcurrency || 4, // Tận dụng đa luồng quét cho lẹ
                    inputStream: {
                        size: 1600 // Resize ảnh nội bộ giúp Quagga nhận diện vạch đen trắng dễ hơn
                    },
                    locator: {
                        patchSize: "large", // Phân bổ lưới quét các vùng rộng lớn
                        halfSample: false   // KHÔNG GIẢM MẪU CHẤT LƯỢNG - Bắt buộc quét chi tiết để tìm mã tít ở góc
                    },
                    decoder: { 
                        readers: ["code_128_reader"],
                        multiple: false
                    },
                    locate: true // KHÔNG BỊ RÀNG BUỘC BỞI THUỘC TÍNH 'AREA' NHƯ LIVE CAM. TỰ DO QUÉT KHẮP MỌI NƠI!
                }, function(result) {
                    if (result && result.codeResult && result.codeResult.code) {
                        const code = result.codeResult.code;
                        if (code.length === 6) {
                            handleSuccessfulScan(code);
                        } else {
                            statusUI.innerText = "❌ Mã không hợp lệ. Đang bật lại Camera...";
                            setTimeout(() => { document.querySelector('#interactive').innerHTML = ''; startScanner(); }, 2500);
                        }
                    } else {
                        statusUI.innerText = "❌ Không tìm thấy mã vạch rõ nét. Đang bật lại Camera...";
                        setTimeout(() => { document.querySelector('#interactive').innerHTML = ''; startScanner(); }, 2500);
                    }
                    e.target.value = ''; // Reset file input để có thể chọn lại đúng ảnh đó nếu cần
                });
            };
            reader.readAsDataURL(file);
        });
    }

    async function fetchMessageAndAnimate(code) {
        try {
            const { data, error } = await mySupabase.from('polaroids').select('message, sender, recipient').eq('short_id', code).single();
            if (error || !data) throw new Error("Not Found");

            confetti({
                particleCount: 100,
                spread: 120,
                origin: { y: 0.5 },
                colors: ['#d4a373', '#fbf7f0', '#c8b495'], 
                disableForReducedMotion: true,
                gravity: 0.4,
                ticks: 250,
                scalar: 1.2
            });

            const recipientEl = document.getElementById('card-recipient');
            const senderEl = document.getElementById('card-sender');
            const messageEl = document.getElementById('card-message');

            recipientEl.classList.remove('ink-reveal');
            senderEl.classList.remove('ink-reveal');
            messageEl.classList.remove('ink-reveal');

            void recipientEl.offsetWidth; 

            recipientEl.innerText = `Gửi tới: ${data.recipient}`;
            senderEl.innerText = `Ký tên: ${data.sender}`;
            messageEl.innerText = data.message;
            
            scrollArea.scrollTop = 0;

            setTimeout(() => {
                statusWrapper.style.opacity = '0';
                messageWrapper.classList.add('show');
                
                recipientEl.classList.add('ink-reveal');
                senderEl.classList.add('ink-reveal');
                messageEl.classList.add('ink-reveal');
            }, 300);

        } catch (err) {
            statusUI.innerText = "Mã không hợp lệ. Đang quét lại...";
            setTimeout(() => resetScanner(), 2000);
        }
    }

    function resetScanner() {
        messageWrapper.classList.remove('show');
        
        setTimeout(() => {
            freezeOverlay.classList.remove('active');
            scanUI.style.opacity = '1';
            statusWrapper.style.opacity = '1';
            statusUI.innerText = "Khớp mã vạch vào khung nhé 📷";
            
            Quagga.stop();
            document.querySelector('#interactive').innerHTML = ''; 
            startScanner();
        }, 500); 
    }
</script>
</body>
</html>
