<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Scanner Pro - Barcode to AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* Scanner Overlay */
        .fullscreen-scanner { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; transition: opacity 0.5s; }
        .scan-line-full { width: 100%; height: 3px; background: #00ffcc; box-shadow: 0 0 30px 8px rgba(0,255,204,0.6); position: absolute; top: -10px; animation: scanFull 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes scanFull { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }
        
        .hud-corner { position: absolute; width: 40px; height: 40px; border-color: rgba(0, 255, 204, 0.5); border-style: solid; }
        .top-left { top: 30px; left: 30px; border-width: 3px 0 0 3px; }
        .top-right { top: 30px; right: 30px; border-width: 3px 3px 0 0; }
        .bottom-left { bottom: 120px; left: 30px; border-width: 0 0 3px 3px; }
        .bottom-right { bottom: 120px; right: 30px; border-width: 0 3px 3px 0; }
        
        /* Status UI */
        .status-wrapper { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 999; width: 85%; max-width: 350px; }
        #status-ui { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0,255,204,0.3); color: #fff; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .icon-pulse { width: 12px; height: 12px; background-color: #ffdd00; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        
        #status-text { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }

        /* AR Video styling */
        video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: absolute; top: 0; left: 0; }
        .a-enter-vr { display: none !important; }
    </style>
</head>
<body>

    <div class="fullscreen-scanner" id="fs-scanner">
        <div class="scan-line-full"></div>
        <div class="hud-corner top-left"></div><div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div><div class="hud-corner bottom-right"></div>
    </div>
    
    <div class="status-wrapper">
        <div id="status-ui">
            <div class="icon-pulse" id="status-icon"></div>
            <span id="status-text">ĐANG KHỞI TẠO CAMERA...</span>
        </div>
    </div>
    
    <div id="ar-scene-container"></div>

<script>
    // --- CẤU HÌNH SUPABASE ---
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const statusText = document.getElementById('status-text');
    const statusIcon = document.getElementById('status-icon');
    const scannerUI = document.getElementById('fs-scanner');

    window.onload = () => {
        startBarcodeScanner();
    };

    // --- BƯỚC 1: QUÉT MÃ VẠCH ---
    function startBarcodeScanner() {
        statusText.innerText = "HÃY QUÉT MÃ VẠCH TRÊN ẢNH";
        statusIcon.style.backgroundColor = "#ffdd00";
        
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.body,
                constraints: { facingMode: "environment" }
            },
            decoder: {
                readers: ["code_128_reader"]
            },
            locate: true
        }, (err) => {
            if (err) {
                statusText.innerText = "LỖI CAMERA! VUI LÒNG CẤP QUYỀN.";
                return;
            }
            Quagga.start();
        });

        let isScanning = true;
        Quagga.onDetected((result) => {
            if (!isScanning) return;
            const code = result.codeResult.code;
            if (code && code.length >= 6) { // Kiểm tra mã có độ dài hợp lệ
                isScanning = false;
                Quagga.stop();
                validateIdAndLoadAR(code);
            }
        });
    }

    // --- BƯỚC 2: KIỂM TRA DATABASE ---
    async function validateIdAndLoadAR(scannedId) {
        statusText.innerText = `ĐÃ THẤY ID: ${scannedId}. ĐANG TRUY XUẤT...`;
        
        try {
            // Tìm trong bảng polaroids, cột id bắt đầu bằng chuỗi scannedId
            const { data, error } = await mySupabase
                .from('polaroids')
                .select('message, sender')
                .filter('id', 'ilike', `${scannedId}%`)
                .limit(1)
                .single();

            if (error || !data) throw new Error("Not Found");

            statusText.innerText = "ĐÃ KẾT NỐI. ĐANG TẢI AR...";
            statusIcon.style.backgroundColor = "#00ffcc";
            
            // Xóa luồng video của Quagga để giải phóng camera
            const oldVideo = document.querySelector('video');
            if(oldVideo) oldVideo.remove();
            const oldCanvas = document.querySelector('canvas');
            if(oldCanvas) oldCanvas.remove();

            loadARScripts(data);

        } catch (err) {
            statusText.innerText = "ID KHÔNG TỒN TẠI. ĐANG THỬ LẠI...";
            statusIcon.style.backgroundColor = "#ff3333";
            setTimeout(() => { startBarcodeScanner(); }, 2000);
        }
    }

    // --- BƯỚC 3: NẠP THƯ VIỆN AR ---
    function loadARScripts(dbData) {
        const aframe = document.createElement('script');
        aframe.src = "https://aframe.io/releases/1.2.0/aframe.min.js";
        aframe.onload = () => {
            registerParticleComponent();
            const arjs = document.createElement('script');
            arjs.src = "https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js";
            arjs.onload = () => buildARScene(dbData);
            document.head.appendChild(arjs);
        };
        document.head.appendChild(aframe);
    }

    // --- BƯỚC 4: HIỆU ỨNG HẠT (HOLOGRAM) ---
    function registerParticleComponent() {
        if (AFRAME.components['data-assembler']) return;
        AFRAME.registerComponent('data-assembler', {
            schema: { targetId: {type: 'string'} },
            init: function() { this.assembled = false; },
            assemble: function() {
                if(this.assembled) return;
                this.assembled = true;
                const targetEl = document.getElementById(this.data.targetId);
                
                for(let i=0; i<60; i++){
                    let p = document.createElement('a-plane');
                    let size = Math.random() * 0.1 + 0.05;
                    p.setAttribute('width', size); p.setAttribute('height', size/2);
                    p.setAttribute('color', Math.random() > 0.5 ? '#00ffcc' : '#ffffff');
                    p.setAttribute('material', 'shader: flat; opacity: 0.8; side: double');
                    
                    let r = 2 + Math.random() * 2;
                    let angle = Math.random() * Math.PI * 2;
                    p.setAttribute('position', `${r * Math.cos(angle)} ${1 + Math.random()*2} ${r * Math.sin(angle)}`);
                    
                    let dur = 600 + Math.random() * 600;
                    p.setAttribute('animation__pos', `property: position; to: 0 0.2 0; dur: ${dur}; easing: easeInQuad`);
                    p.setAttribute('animation__scale', `property: scale; to: 0 0 0; dur: ${dur}; easing: easeInQuad`);
                    
                    this.el.appendChild(p);
                    setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, dur + 50);
                }

                setTimeout(() => {
                    targetEl.setAttribute('visible', 'true');
                    targetEl.setAttribute('animation', 'property: scale; from: 0 0 0; to: 1 1 1; dur: 1200; easing: easeOutElastic');
                }, 1000);
            },
            reset: function() {
                this.assembled = false;
                const targetEl = document.getElementById(this.data.targetId);
                targetEl.setAttribute('visible', 'false');
                targetEl.setAttribute('scale', '0 0 0');
                while(this.el.firstChild) { this.el.removeChild(this.el.firstChild); }
            }
        });
    }

    // --- BƯỚC 5: KHỞI TẠO AR SCENE ---
    function buildARScene(data) {
        document.getElementById('ar-scene-container').innerHTML = `
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
                <a-marker preset="hiro" id="ar-marker">
                    <a-entity id="particle-core" data-assembler="targetId: hologram-msg"></a-entity>
                    <a-entity id="hologram-msg" visible="false" scale="0 0 0">
                        <a-entity animation="property: position; from: 0 0.2 0; to: 0 0.4 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
                            <a-plane position="0 0 -0.05" rotation="-90 0 0" width="3.5" height="2.5" color="#0a0a0a" opacity="0.9"></a-plane>
                            <a-plane position="0 0.01 -0.05" rotation="-90 0 0" width="3.55" height="2.55" color="#00ffcc" opacity="0.3" material="wireframe: true"></a-plane>
                            <a-text value="FROM: ${data.sender.toUpperCase()}" color="#00ffcc" position="0 0.1 -0.8" rotation="-90 0 0" align="center" width="4" font="kelsonsans"></a-text>
                            <a-text value="${data.message}" color="#FFFFFF" position="0 0.1 0.2" rotation="-90 0 0" align="center" width="3.2" wrap-count="28" font="roboto"></a-text>
                        </a-entity>
                    </a-entity>
                </a-marker>
                <a-entity camera></a-entity>
            </a-scene>
        `;

        statusText.innerText = "QUÉT MÃ HIRO ĐỂ MỞ TÂM THƯ";
        statusIcon.style.backgroundColor = "#ffdd00";

        // Chờ AR Scene sẵn sàng
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
            const marker = document.getElementById('ar-marker');
            const pCore = document.getElementById('particle-core');
            
            marker.addEventListener('markerFound', () => {
                statusText.innerText = "ĐANG GIẢI MÃ...";
                scannerUI.style.opacity = "0";
                if(pCore) pCore.components['data-assembler'].assemble();
            });

            marker.addEventListener('markerLost', () => {
                statusText.innerText = "HÃY QUÉT HIRO MARKER";
                scannerUI.style.opacity = "1";
                if(pCore) pCore.components['data-assembler'].reset();
            });
        });
    }
</script>
</body>
</html>
