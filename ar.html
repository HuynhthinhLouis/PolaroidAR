<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Pro - Smart Decode</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        #interactive.viewport { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #interactive.viewport video, #interactive.viewport canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #interactive.viewport canvas { z-index: 2; pointer-events: none; }
        
        .freeze-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .freeze-overlay.active { opacity: 1; pointer-events: all; }

        .scan-frame { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; transition: opacity 0.3s; }
        .scan-line-full { width: 100%; height: 3px; background: #00ffcc; box-shadow: 0 0 30px 8px rgba(0,255,204,0.6); position: absolute; top: -10px; animation: scanFull 2s linear infinite; }
        @keyframes scanFull { 0% { top: 10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 90%; opacity: 0; } }
        
        .hud-corner { position: absolute; width: 40px; height: 40px; border-color: rgba(0, 255, 204, 0.7); border-style: solid; border-radius: 8px; }
        .top-left { top: 20%; left: 10%; border-width: 4px 0 0 4px; }
        .top-right { top: 20%; right: 10%; border-width: 4px 4px 0 0; }
        .bottom-left { bottom: 25%; left: 10%; border-width: 0 0 4px 4px; }
        .bottom-right { bottom: 25%; right: 10%; border-width: 0 4px 4px 0; }
        
        .status-wrapper { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; width: 85%; max-width: 350px; text-align: center; transition: opacity 0.3s;}
        #status-ui { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(0,255,204,0.3); color: #00ffcc; padding: 15px; border-radius: 30px; font-size: 14px; font-weight: 800; letter-spacing: 1px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);}
        
        #message-card {
            position: absolute;
            background: #fff;
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform-origin: center center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #message-card.show {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1) !important;
            width: 85%;
            max-width: 380px;
            opacity: 1;
            pointer-events: all;
        }

        .msg-sender { font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; color: #111; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid #111; padding-bottom: 5px;}
        .msg-text { font-family: 'Caveat', cursive; font-size: 36px; color: #1a1a1a; line-height: 1.2; text-align: center; margin: 0 0 30px 0; }
        
        .btn-rescan {
            background: #111; color: #00ffcc; border: none; padding: 14px 30px; border-radius: 30px; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 1px; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .btn-rescan:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="interactive" class="viewport"></div>
    <div id="freeze-overlay" class="freeze-overlay"></div>

    <div class="scan-frame" id="scan-ui">
        <div class="scan-line-full"></div>
        <div class="hud-corner top-left"></div><div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div><div class="hud-corner bottom-right"></div>
    </div>
    
    <div class="status-wrapper" id="status-wrapper">
        <div id="status-ui">ĐANG KHỞI TẠO CAMERA...</div>
    </div>
    
    <div id="message-card">
        <div class="msg-sender" id="card-sender"></div>
        <p class="msg-text" id="card-message"></p>
        <button class="btn-rescan" onclick="resetScanner()">QUÉT MÃ KHÁC</button>
    </div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const statusUI = document.getElementById('status-ui');
    const scanUI = document.getElementById('scan-ui');
    const freezeOverlay = document.getElementById('freeze-overlay');
    const messageCard = document.getElementById('message-card');
    const statusWrapper = document.getElementById('status-wrapper');

    window.onload = () => { startScanner(); };

    function startScanner() {
        statusUI.innerText = "HÃY QUÉT MÃ VẠCH (ID CARD)";
        
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    advanced: [{ focusMode: "continuous" }] 
                }
            },
            locator: { patchSize: "large", halfSample: false },
            numOfWorkers: navigator.hardwareConcurrency || 4,
            decoder: { readers: ["code_128_reader"], multiple: false },
            locate: true 
        }, (err) => {
            if (err) return statusUI.innerText = "LỖI CAMERA! HÃY CẤP QUYỀN.";
            Quagga.start();
        });

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (code && code.length === 6) { 
                
                Quagga.stop();
                const videoEl = document.querySelector("#interactive video");
                if(videoEl) videoEl.pause(); 

                let originX = window.innerWidth / 2;
                let originY = window.innerHeight / 2;
                if(result.line && result.line.length >= 2) {
                    const canvas = document.querySelector("#interactive canvas.drawingBuffer");
                    if(canvas) {
                        const boxX = (result.line[0].x + result.line[1].x) / 2;
                        const boxY = (result.line[0].y + result.line[1].y) / 2;
                        originX = (boxX / canvas.width) * window.innerWidth;
                        originY = (boxY / canvas.height) * window.innerHeight;
                    }
                }

                scanUI.style.opacity = '0';
                statusUI.innerText = "ĐANG TRUY XUẤT DỮ LIỆU MẬT...";
                freezeOverlay.classList.add('active');

                fetchMessageAndAnimate(code, originX, originY);
            }
        });
    }

    async function fetchMessageAndAnimate(code, x, y) {
        try {
            const { data, error } = await mySupabase.from('polaroids').select('message, sender').eq('short_id', code).single();
            if (error || !data) throw new Error("Not Found");

            document.getElementById('card-sender').innerText = `DATA // ${data.sender}`;
            document.getElementById('card-message').innerText = data.message;

            statusWrapper.style.opacity = '0';

            messageCard.style.top = `${y}px`;
            messageCard.style.left = `${x}px`;
            messageCard.style.transform = `translate(-50%, -50%) scale(0.1)`;
            
            void messageCard.offsetWidth;

            messageCard.classList.add('show');

        } catch (err) {
            statusUI.innerText = "MÃ LỖI! THỬ LẠI SAU 2S...";
            statusUI.style.color = "#ff3333";
            setTimeout(() => resetScanner(), 2000);
        }
    }

    function resetScanner() {
        messageCard.classList.remove('show');
        
        setTimeout(() => {
            freezeOverlay.classList.remove('active');
            scanUI.style.opacity = '1';
            statusWrapper.style.opacity = '1';
            statusUI.style.color = "#00ffcc";
            statusUI.innerText = "HÃY QUÉT MÃ VẠCH (ID CARD)";
            
            Quagga.stop();
            document.querySelector('#interactive').innerHTML = ''; 
            startScanner();
        }, 500); 
    }
</script>
</body>
</html>
