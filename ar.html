<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        .fullscreen-scanner { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; overflow: hidden; }
        
        .scan-line-full { width: 100%; height: 3px; background: #00ffcc; box-shadow: 0 0 30px 8px rgba(0,255,204,0.6); position: absolute; top: -10px; animation: scanFull 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes scanFull { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }
        
        .hud-corner { position: absolute; width: 40px; height: 40px; border-color: rgba(0, 255, 204, 0.5); border-style: solid; }
        .hud-corner.top-left { top: 30px; left: 30px; border-width: 3px 0 0 3px; }
        .hud-corner.top-right { top: 30px; right: 30px; border-width: 3px 3px 0 0; }
        .hud-corner.bottom-left { bottom: 100px; left: 30px; border-width: 0 0 3px 3px; }
        .hud-corner.bottom-right { bottom: 100px; right: 30px; border-width: 0 3px 3px 0; }
        
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.4); }
        .crosshair::before { top: 50%; left: -10px; width: 50px; height: 1px; transform: translateY(-50%); }
        .crosshair::after { left: 50%; top: -10px; height: 50px; width: 1px; transform: translateX(-50%); }

        .status-wrapper { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 999; width: 85%; max-width: 350px; text-align: center; }
        #status-ui { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0,255,204,0.2); color: #fff; padding: 15px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; }
        .icon-pulse { width: 14px; height: 14px; background-color: #ffdd00; border-radius: 50%; box-shadow: 0 0 12px #ffdd00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        
        .a-enter-vr { display: none !important; }
    </style>
</head>
<body>

    <div class="fullscreen-scanner" id="fs-scanner">
        <div class="scan-line-full"></div>
        <div class="hud-corner top-left"></div><div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div><div class="hud-corner bottom-right"></div>
        <div class="crosshair"></div>
    </div>
    
    <div class="status-wrapper">
        <div id="status-ui">
            <div class="icon-pulse" id="status-icon"></div>
            <span id="status-text" style="letter-spacing: 0.5px;">ĐANG KẾT NỐI DB...</span>
        </div>
    </div>
    
    <div id="ar-scene-container"></div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const urlParams = new URLSearchParams(window.location.search);
    const polaroidId = urlParams.get('id');

    if (!polaroidId) {
        document.getElementById('status-text').innerText = "LỖI: KHÔNG CÓ ID!";
        document.getElementById('status-icon').style.backgroundColor = "#ff3333";
        document.getElementById('fs-scanner').style.display = "none";
    } else {
        fetchDatabaseAndBootAR(polaroidId);
    }

    async function fetchDatabaseAndBootAR(id) {
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');
        
        try {
            const { data, error } = await mySupabase.from('polaroids').select('message, sender').eq('id', id).single();
            if (error || !data) throw new Error();

            statusText.innerText = "NẠP LÕI AR.JS...";
            
            // 1. Tải A-Frame
            const aframeScript = document.createElement('script');
            aframeScript.src = "https://aframe.io/releases/1.2.0/aframe.min.js";
            aframeScript.onload = () => {
                
                // Đăng ký hiệu ứng Lốc xoáy hạt (Particle)
                AFRAME.registerComponent('data-assembler', {
                    schema: { targetId: {type: 'string'} },
                    init: function() { this.assembled = false; },
                    assemble: function() {
                        if(this.assembled) return;
                        this.assembled = true;
                        
                        const targetEl = document.getElementById(this.data.targetId);
                        targetEl.setAttribute('visible', 'false');
                        targetEl.removeAttribute('animation'); 
                        
                        for(let i=0; i<60; i++){
                            let p = document.createElement('a-plane');
                            let size = Math.random() * 0.15 + 0.02;
                            p.setAttribute('width', size); p.setAttribute('height', size / 2.5); 
                            p.setAttribute('color', Math.random() > 0.3 ? '#00ffcc' : '#ffffff');
                            p.setAttribute('material', 'shader: flat; opacity: 0.8; side: double');
                            
                            let r = 1.5 + Math.random() * 2; let angle = Math.random() * Math.PI * 2; let startY = 1 + Math.random() * 3;
                            let startX = r * Math.cos(angle); let startZ = r * Math.sin(angle);
                            
                            p.setAttribute('position', `${startX} ${startY} ${startZ}`);
                            p.setAttribute('rotation', `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`);
                            
                            let dur = 700 + Math.random() * 800; 
                            p.setAttribute('animation__pos', `property: position; to: 0 0.2 0; dur: ${dur}; easing: easeInExpo`);
                            p.setAttribute('animation__rot', `property: rotation; to: 0 0 0; dur: ${dur}; easing: easeInExpo`);
                            p.setAttribute('animation__scale', `property: scale; to: 0 0 0; dur: ${dur}; easing: easeInExpo`);
                            
                            this.el.appendChild(p);
                            setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, dur + 50);
                        }
                        
                        setTimeout(() => {
                            targetEl.setAttribute('visible', 'true');
                            targetEl.setAttribute('animation', 'property: scale; from: 0 0 0; to: 1 1 1; dur: 1200; easing: easeOutElastic');
                        }, 1400); 
                    },
                    reset: function() {
                        this.assembled = false;
                        const targetEl = document.getElementById(this.data.targetId);
                        targetEl.setAttribute('visible', 'false');
                        targetEl.setAttribute('scale', '0 0 0');
                        while(this.el.firstChild) { this.el.removeChild(this.el.firstChild); }
                    }
                });

                // 2. Tải AR.js sau khi A-Frame xong
                const arjsScript = document.createElement('script');
                arjsScript.src = "https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js";
                arjsScript.onload = () => buildScene(data);
                document.head.appendChild(arjsScript);
            };
            document.head.appendChild(aframeScript);

        } catch (err) {
            statusText.innerText = "TÂM THƯ KHÔNG TỒN TẠI!";
            statusIcon.style.backgroundColor = "#ff3333";
            document.getElementById('fs-scanner').style.opacity = '0';
        }
    }

    function buildScene(data) {
        document.getElementById('ar-scene-container').innerHTML = `
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
                <a-marker preset="hiro" id="ar-marker">
                    <a-entity id="particle-core" data-assembler="targetId: hologram-msg"></a-entity>
                    <a-entity id="hologram-msg" visible="false" scale="0 0 0">
                        <a-entity animation="property: position; from: 0 0.1 0; to: 0 0.35 0; dir: alternate; dur: 2500; loop: true; easing: easeInOutSine">
                            <a-plane position="0 0 -0.05" rotation="-90 0 0" width="3.5" height="2.5" color="#050505" opacity="0.9" material="shader: flat"></a-plane>
                            <a-plane position="0 0.01 -0.05" rotation="-90 0 0" width="3.55" height="2.55" color="#00ffcc" opacity="0.5" material="wireframe: true"></a-plane>
                            <a-text value="FROM: ${data.sender.toUpperCase()}" color="#00ffcc" position="0 0.05 -0.8" rotation="-90 0 0" align="center" width="4" font="kelsonsans"></a-text>
                            <a-text value="${data.message}" color="#FFFFFF" position="0 0.05 0.2" rotation="-90 0 0" align="center" width="3.5" wrap-count="28" line-height="60" font="roboto"></a-text>
                        </a-entity>
                    </a-entity>
                </a-marker>
                <a-entity camera></a-entity>
            </a-scene>
        `;

        document.getElementById('status-text').innerText = "SẴN SÀNG! QUÉT HIRO MARKER.";
        document.getElementById('status-icon').style.backgroundColor = "#ffdd00"; 
        document.getElementById('status-icon').style.boxShadow = "0 0 10px #ffdd00";

        setTimeout(() => {
            const marker = document.getElementById('ar-marker');
            const pCore = document.getElementById('particle-core');
            const scannerUI = document.getElementById('fs-scanner');
            
            if(marker) {
                marker.addEventListener('markerFound', () => {
                    document.getElementById('status-text').innerText = "ĐANG GIẢI MÃ...";
                    document.getElementById('status-icon').style.backgroundColor = "#00ffcc"; 
                    document.getElementById('status-icon').style.boxShadow = "0 0 15px #00ffcc";
                    scannerUI.style.opacity = '0'; 
                    if(pCore && pCore.components['data-assembler']) pCore.components['data-assembler'].assemble();
                });
                
                marker.addEventListener('markerLost', () => {
                    document.getElementById('status-text').innerText = "TÌM KIẾM MARKER...";
                    document.getElementById('status-icon').style.backgroundColor = "#ffdd00"; 
                    document.getElementById('status-icon').style.boxShadow = "0 0 10px #ffdd00";
                    scannerUI.style.opacity = '1';
                    if(pCore && pCore.components['data-assembler']) pCore.components['data-assembler'].reset();
                });
            }
        }, 1000);
    }
</script>
</body>
</html>
