<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Máy Quét Tâm Thư AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Inter', sans-serif; }
        
        /* Camera Background */
        #interactive.viewport { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #interactive.viewport video, #interactive.viewport canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #interactive.viewport canvas { z-index: 2; pointer-events: none; }
        
        /* Hiệu ứng chớp Flash nhẹ nhàng */
        .flash-effect { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .flash-effect.trigger { animation: flashAnim 0.5s ease-out forwards; }
        @keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        /* Lớp mờ đóng băng video khi đã quét xong */
        .freeze-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .freeze-overlay.active { opacity: 1; pointer-events: all; }

        /* MẶT NẠ CẮT KHUNG POLAROID */
        .camera-mask {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none; overflow: hidden;
            transition: opacity 0.3s;
        }
        
        /* Khung định vị tổng thể */
        .polaroid-guide {
            width: 78vw; max-width: 320px;
            aspect-ratio: 3 / 4.1; /* Khớp tỷ lệ thẻ in ra */
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.65); /* Làm tối vạn vật bên ngoài thẻ */
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        
        /* Vùng chứa ảnh trên thẻ (Không quét) */
        .photo-guide { flex: 1; position: relative; }
        .photo-guide::after {
            content: "KHUNG ẢNH"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 2px; font-size: 14px;
        }

        /* Vùng chứa mã vạch (Vùng quét) */
        .barcode-guide {
            height: 22%; /* Chiếm khoảng 1/5 thẻ ở đáy */
            background: rgba(0, 255, 204, 0.15);
            border-top: 2px dashed #00ffcc;
            position: relative;
        }
        .laser-line { position: absolute; width: 100%; height: 2px; background: #00ffcc; box-shadow: 0 0 12px 2px #00ffcc; animation: scanLine 1.5s ease-in-out infinite alternate; }
        @keyframes scanLine { 0% { top: 5%; } 100% { top: 95%; } }
        .scan-hint { position: absolute; bottom: -35px; width: 100%; text-align: center; color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}

        /* Giao diện thanh trạng thái thân thiện */
        .status-wrapper { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 10; width: 90%; max-width: 350px; text-align: center; transition: opacity 0.3s;}
        #status-ui { background: #fff; color: #111; padding: 14px 20px; border-radius: 30px; font-size: 14px; font-weight: 700; box-shadow: 0 8px 25px rgba(0,0,0,0.2); display: inline-block;}
        
        /* THẺ TÂM THƯ BẬT LÊN (THIẾT KẾ MỀM MẠI, TINH TẾ HƠN) */
        #message-card {
            position: absolute; background: #fff; border-radius: 24px; padding: 35px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 20; display: flex; flex-direction: column; align-items: center;
            opacity: 0; pointer-events: none;
            transform-origin: center center; transform: translate(-50%, -50%) scale(0.8) translateY(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #message-card.show {
            top: 50% !important; left: 50% !important;
            transform: translate(-50%, -50%) scale(1) translateY(0) !important;
            width: 85%; max-width: 360px; opacity: 1; pointer-events: all;
        }

        .msg-header { width: 100%; text-align: center; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px;}
        .badge { background: #111; color: #fff; font-size: 10px; padding: 4px 10px; border-radius: 12px; letter-spacing: 1px; margin-bottom: 10px; display: inline-block;}
        .msg-sender { font-size: 15px; color: #555; font-weight: 600;}
        .msg-recipient { font-size: 18px; color: #111; font-weight: 800;}
        
        .msg-text { font-family: 'Caveat', cursive; font-size: 32px; color: #222; line-height: 1.4; text-align: center; margin: 0 0 35px 0;}
        
        .btn-rescan {
            background: #f4f4f9; color: #111; border: 2px solid #e0e0e0; padding: 14px 30px; border-radius: 30px; 
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .btn-rescan:active { background: #e0e0e0; transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="flash-effect" id="flash"></div>
    <div id="interactive" class="viewport"></div>
    <div id="freeze-overlay" class="freeze-overlay"></div>

    <div class="camera-mask" id="scan-ui">
        <div class="polaroid-guide">
            <div class="photo-guide"></div>
            <div class="barcode-guide">
                <div class="laser-line"></div>
                <div class="scan-hint">ĐẶT MÃ VẠCH VÀO ĐÂY</div>
            </div>
        </div>
    </div>
    
    <div class="status-wrapper" id="status-wrapper">
        <div id="status-ui">👋 Xin chào! Đang bật Camera...</div>
    </div>
    
    <div id="message-card">
        <div class="msg-header">
            <div class="badge">BỨC THƯ BÍ MẬT</div>
            <div class="msg-sender" id="card-sender"></div>
            <div class="msg-recipient" id="card-recipient"></div>
        </div>
        <p class="msg-text" id="card-message"></p>
        <button class="btn-rescan" onclick="resetScanner()">Đóng & Quét Thẻ Khác</button>
    </div>

<script>
    const supabaseUrl = 'https://ohnoowsqmyryipfresae.supabase.co';
    const supabaseKey = 'sb_publishable_noPrqgubuZS1dgUPlsnOKw_aOnRdWN0';
    const mySupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const statusUI = document.getElementById('status-ui');
    const scanUI = document.getElementById('scan-ui');
    const freezeOverlay = document.getElementById('freeze-overlay');
    const messageCard = document.getElementById('message-card');
    const statusWrapper = document.getElementById('status-wrapper');
    const flashEffect = document.getElementById('flash');

    window.onload = () => { startScanner(); };

    function startScanner() {
        statusUI.innerText = "Khớp thẻ vào khung hình nhé!";
        
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    advanced: [{ focusMode: "continuous" }] 
                },
                // TỐI ƯU CỐT LÕI: Chỉ cho phép quét ở đáy màn hình.
                // Điều này giúp thuật toán xử lý cực nhanh vì bỏ qua toàn bộ phần ảnh rườm rà ở trên
                area: {
                    top: "55%",    // Bỏ qua 55% màn hình phía trên
                    bottom: "5%",  // Chừa 5% rìa dưới
                    left: "15%",   // Cắt viền trái
                    right: "15%"   // Cắt viền phải
                }
            },
            locator: { patchSize: "large", halfSample: true },
            numOfWorkers: navigator.hardwareConcurrency || 4,
            decoder: { readers: ["code_128_reader"], multiple: false },
            locate: true 
        }, (err) => {
            if (err) return statusUI.innerText = "❌ Lỗi: Không thể mở Camera.";
            Quagga.start();
        });

        Quagga.onDetected((result) => {
            const code = result.codeResult.code;
            if (code && code.length === 6) { 
                
                Quagga.stop(); 
                
                // Hiệu ứng chớp nháy
                flashEffect.classList.remove('trigger');
                void flashEffect.offsetWidth; 
                flashEffect.classList.add('trigger');

                // Đóng băng video
                const videoEl = document.querySelector("#interactive video");
                if(videoEl) videoEl.pause(); 

                // Tọa độ từ vùng đáy
                let originX = window.innerWidth / 2;
                let originY = window.innerHeight * 0.75; // Đặt mặc định bay ra từ nửa dưới màn hình

                scanUI.style.opacity = '0';
                statusUI.innerText = "Đang mở thư...";
                freezeOverlay.classList.add('active');

                fetchMessageAndAnimate(code, originX, originY);
            }
        });
    }

    async function fetchMessageAndAnimate(code, x, y) {
        try {
            const { data, error } = await mySupabase.from('polaroids').select('message, sender, recipient').eq('short_id', code).single();
            if (error || !data) throw new Error("Not Found");

            document.getElementById('card-sender').innerText = `Từ: ${data.sender}`;
            document.getElementById('card-recipient').innerText = `Gửi: ${data.recipient}`;
            document.getElementById('card-message').innerText = data.message;

            setTimeout(() => {
                statusWrapper.style.opacity = '0';
                messageCard.style.top = `${y}px`;
                messageCard.style.left = `${x}px`;
                void messageCard.offsetWidth; 
                messageCard.classList.add('show');
            }, 300);

        } catch (err) {
            statusUI.innerText = "Mã không hợp lệ. Đang quét lại...";
            statusUI.style.color = "red";
            setTimeout(() => resetScanner(), 2000);
        }
    }

    function resetScanner() {
        messageCard.classList.remove('show');
        statusUI.style.color = "#111";
        
        setTimeout(() => {
            freezeOverlay.classList.remove('active');
            scanUI.style.opacity = '1';
            statusWrapper.style.opacity = '1';
            statusUI.innerText = "Khớp thẻ vào khung hình nhé!";
            
            Quagga.stop();
            document.querySelector('#interactive').innerHTML = ''; 
            startScanner();
        }, 400); 
    }
</script>
</body>
</html>
